<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThulThul - Coming Soon</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #000000, #0f3d2e);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        width: 90%;
        max-width: 1200px;
    }

    h1 {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 10px;
    }

    h1 span {
        color: #22c55e;
    }

    p {
        color: #bbb;
        margin-bottom: 25px;
        font-size: 1.1rem;
    }

    /* IMAGE PERFECT FIT */
    .image-box {
        width: 1100px;
        height: 450px;
        margin: 0 auto 30px;
        border-radius: 20px;
        overflow: hidden;
        background: #111;
    }

    .image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* perfect fill */
    }

    .tagline {
        margin-bottom: 30px;
        color: #aaa;
        font-size: 1rem;
    }

    .countdown {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .time-box {
        background: rgba(255,255,255,0.05);
        padding: 15px 20px;
        border-radius: 10px;
        min-width: 90px;
    }

    .time-box span {
        display: block;
        font-size: 2rem;
        font-weight: bold;
        color: #22c55e;
    }

    /* RESPONSIVE */
    @media (max-width: 1200px) {
        .image-box {
            width: 100%;
            height: auto;
            aspect-ratio: 1100 / 450;
        }
    }

</style>
</head>

<body>

<div class="container">

    <h1>Build strength. Build <span>CONFIDENCE</span></h1>
    <p>Something powerful is coming for those ready to transform.</p>

    <!-- IMAGE -->
    <div class="image-box">
        <img src="website_banner.png" alt="Transformation">
    </div>

    <div class="tagline">
        No shortcuts. No excuses. Just real transformation.
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown">
        <div class="time-box">
            <span id="days">00</span>
            Days
        </div>
        <div class="time-box">
            <span id="hours">00</span>
            Hours
        </div>
        <div class="time-box">
            <span id="minutes">00</span>
            Minutes
        </div>
        <div class="time-box">
            <span id="seconds">00</span>
            Seconds
        </div>
    </div>

</div>

<script>
    // SET YOUR LAUNCH DATE HERE (same for all users)
    const targetDate = new Date("2026-06-01T00:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance <= 0) {
            document.querySelector(".countdown").innerHTML = "WE ARE LIVE 🚀";
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = hours;
        document.getElementById("minutes").innerText = minutes;
        document.getElementById("seconds").innerText = seconds;
    }

    updateCountdown(); // run immediately
    setInterval(updateCountdown, 1000);
</script>
</body>
</html>
